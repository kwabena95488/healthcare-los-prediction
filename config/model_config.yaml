# Model-specific configurations
baseline:
  model_type: "LogisticRegression"
  max_iter: 1000
  random_state: 42

xgboost:
  model_type: "XGBClassifier"
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  random_state: 42
  
lightgbm:
  model_type: "LGBMClassifier"
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  random_state: 42
  verbose: -1

catboost:
  model_type: "CatBoostClassifier"
  iterations: 100
  depth: 6
  learning_rate: 0.1
  random_seed: 42
  verbose: False

neural_network:
  model_type: "MLPClassifier"
  hidden_layer_sizes: [100, 50]
  max_iter: 500
  random_state: 42

ensemble:
  model_type: "StackingClassifier"
  cv: 5
  final_estimator: "LogisticRegression"
  
# Hyperparameter tuning
tuning:
  n_trials: 100
  cv_folds: 5
  scoring: "f1_weighted" 